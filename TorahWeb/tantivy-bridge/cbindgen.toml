language = "C"
include_guard = "TANTIVY_BRIDGE_H"
no_includes = false
sys_includes = ["stdint.h", "stddef.h"]
header = "/* Auto-generated by cbindgen — do not edit. */"
documentation = true
documentation_style = "c"

[export]
include = [
    "torah_search_open",
    "torah_search_query",
    "torah_search_free",
    "torah_search_close",
]

[export.rename]
"i32" = "int32_t"
"u32" = "uint32_t"

[fn]
prefix = ""
